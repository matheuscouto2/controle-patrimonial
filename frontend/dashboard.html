<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>PatriFlow</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>

    <div id="loading" class="loading-overlay" style="display:none;">
        <div class="spinner"></div> 
        <p>Carregando...</p>
    </div>

    <div style="
        display: flex;
        align-items: center;
        gap: 10px;
        border-bottom: 1px solid var(--border);
        background: white;
    ">
        <div>
            <span style="font-weight: bold;font-size: x-large;margin-left: 30px;">PATRIFLOW</span>
        </div>

        <nav id="menu-items" style="display: flex;gap: 10px;width: 100%;">
            <button id="dash" onclick="loadDashboard()" class="">Dashboard</button>
            <button id="bens" onclick="loadBens()" class="active">Bens</button>
            <button id="setores" onclick="loadSetores()">Setores</button>
            <button id="responsaveis" onclick="loadResponsaveis()">Responsáveis</button>
            <button id="movimentacoes" onclick="loadMovimentacoes()">Movimentações</button>
            <button onclick="logout()">Sair</button>
        </nav>
    </div>

    <main id="conteudo">
        <h2>Bem-vindo ao Controle Patrimonial</h2>
    </main>

    <script src="js/dashboard.js"></script>
    <script src="js/api.js"></script>
    <script src="js/bens.js"></script>
    <script src="js/setores.js"></script>
    <script src="js/responsaveis.js"></script>
    <script src="js/movimentacoes.js"></script>

    <script>
        loadDashboard();
        function ativarMenu(idBotao) {
            const botoes = document.querySelectorAll("#menu-items button");
            botoes.forEach(btn => btn.classList.remove("active"));

            const botaoAtivo = document.getElementById(idBotao);
            if (botaoAtivo) {
                botaoAtivo.classList.add("active");
            }
        }
    </script>

</body>

</html>
